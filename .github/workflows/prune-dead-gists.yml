name: Prune Dead Gists

on:
  schedule:
    - cron: '0 3 * * 0'  # Every Sunday at 03:00 UTC
  workflow_dispatch:

concurrency:
  group: prune-dead-gists
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  prune:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Check and prune dead gists
        id: prune
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node --input-type=module - <<'EOF'
          import { readdir, readFile, writeFile, unlink, appendFile } from 'fs/promises';
          import { join } from 'path';

          const SHARDS_DIR = './shards';
          const DELAY_MS = 200; // stay well within GitHub API rate limits
          const RATE_LIMIT_BUFFER = 200; // stop if fewer than this many requests remain
          const sleep = ms => new Promise(r => setTimeout(r, ms));

          async function isGistAlive(gistId) {
            const res = await fetch(`https://api.github.com/gists/${gistId}`, {
              headers: {
                'Authorization': `Bearer ${process.env.GITHUB_TOKEN}`,
                'Accept': 'application/vnd.github+json',
                'User-Agent': 'fragcap-registry-pruner'
              }
            });
            const remaining = parseInt(res.headers.get('x-ratelimit-remaining') ?? '9999', 10);
            return { alive: res.status !== 404, remaining };
          }

          const files = (await readdir(SHARDS_DIR)).filter(f => f.endsWith('.json'));
          let totalRemoved = 0;
          let totalChecked = 0;
          let shardsModified = 0;
          let rateLimitHit = false;

          outer: for (const file of files) {
            const path = join(SHARDS_DIR, file);
            const shard = JSON.parse(await readFile(path, 'utf8'));
            const capsules = shard.capsules ?? [];
            const surviving = [];

            for (const cap of capsules) {
              await sleep(DELAY_MS);
              totalChecked++;
              const { alive, remaining } = await isGistAlive(cap.gist_id);
              if (remaining < RATE_LIMIT_BUFFER) {
                console.warn(`Rate limit low (${remaining} remaining) — stopping early.`);
                if (alive) surviving.push(cap);
                else totalRemoved++;
                // Preserve unchecked capsules as-is (will be checked next run)
                surviving.push(...capsules.slice(capsules.indexOf(cap) + 1));
                rateLimitHit = true;
                break outer;
              }
              if (alive) {
                surviving.push(cap);
              } else {
                console.log(`DEAD: ${cap.gist_id} (${cap.problem ?? 'no problem text'})`);
                totalRemoved++;
              }
            }

            if (surviving.length !== capsules.length) {
              if (surviving.length === 0) {
                await unlink(path);
                console.log(`Removed empty shard: ${file}`);
              } else {
                await writeFile(path, JSON.stringify({ ...shard, capsules: surviving }, null, 2));
              }
              shardsModified++;
            }
          }

          console.log(`\nDone. Checked: ${totalChecked} | Removed: ${totalRemoved} | Shards modified: ${shardsModified}${rateLimitHit ? ' | rate-limit-hit=true' : ''}`);
          const summary = `checked=${totalChecked} removed=${totalRemoved} modified=${shardsModified}`;
          await appendFile(process.env.GITHUB_OUTPUT, `summary=${summary}\n`);
          await appendFile(process.env.GITHUB_OUTPUT, `removed=${totalRemoved}\n`);
          EOF

      - name: Rebuild manifest
        if: steps.prune.outputs.removed != '0'
        run: |
          # When shards/ is empty (only .gitkeep exists), ls returns nothing and jq -s . produces [],
          # which is the correct empty state — no special handling needed.
          FILES=$(ls shards/*.json 2>/dev/null | xargs -I{} basename {} | jq -R . | jq -s .)
          jq -n \
            --argjson shards "$FILES" \
            '{version: 1, updated_at: now | strftime("%Y-%m-%dT%H:%M:%SZ"), shards: $shards}' \
            > manifest.json

      - name: Commit changes
        env:
          PRUNE_SUMMARY: ${{ steps.prune.outputs.summary }}
        run: |
          git config user.name "fragcap[bot]"
          git config user.email "bot@fragcap.dev"
          git add shards/ manifest.json
          git diff --cached --quiet || git commit -m "prune: remove dead gists ($PRUNE_SUMMARY)"
          git push
