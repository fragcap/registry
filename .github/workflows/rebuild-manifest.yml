name: Rebuild Manifest
on:
  push:
    paths: ['shards/**']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Generate manifest
        run: |
          SHARDS='[]'
          for f in shards/*.json; do
            [ -f "$f" ] || continue
            name=$(basename "$f")
            hash=$(sha256sum "$f" | cut -c1-8)
            SHARDS=$(echo "$SHARDS" | jq --arg f "$name" --arg h "$hash" '. + [{"file": $f, "hash": $h}]')
          done
          jq -n \
            --argjson shards "$SHARDS" \
            '{version: 2, updated_at: now | strftime("%Y-%m-%dT%H:%M:%SZ"), shards: $shards}' \
            > manifest.json

      - name: Commit
        run: |
          git config user.name "fragcap[bot]"
          git config user.email "bot@fragcap.dev"
          git add manifest.json
          git diff --cached --quiet || git commit -m "rebuild manifest"
          git push
